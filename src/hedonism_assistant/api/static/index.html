<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hedonism Wines Assistant</title>
  <style>
    :root {
      --bg: #1a1410;
      --panel: #241c16;
      --ink: #f3ece2;
      --muted: #b09a82;
      --accent: #b8893f;
      --user: #3a2c1e;
      --line: #3a2e24;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font: 16px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
    }
    header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    header p { margin: 2px 0 0; font-size: 13px; color: var(--muted); }
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-width: 820px;
      width: 100%;
      margin: 0 auto;
    }
    .msg { padding: 12px 16px; border-radius: 12px; white-space: pre-wrap; }
    .user { background: var(--user); align-self: flex-end; max-width: 80%; }
    .bot { background: var(--panel); align-self: flex-start; max-width: 90%; }
    .citations { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
    .citation {
      font-size: 14px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .citation a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .citation a:hover { text-decoration: underline; }
    .citation .price { color: var(--muted); }
    .suggestions { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      font-size: 13px;
      padding: 6px 12px;
      border: 1px solid var(--accent);
      border-radius: 999px;
      color: var(--accent);
      background: none;
      cursor: pointer;
    }
    .chip:hover { background: var(--accent); color: var(--bg); }
    .error { color: #e08a7a; }
    footer {
      border-top: 1px solid var(--line);
      padding: 14px 20px;
    }
    form { display: flex; gap: 10px; max-width: 820px; margin: 0 auto; }
    #input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      font-size: 16px;
    }
    #send {
      padding: 12px 22px;
      border-radius: 10px;
      border: none;
      background: var(--accent);
      color: var(--bg);
      font-weight: 600;
      cursor: pointer;
    }
    #send:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <header>
    <h1>Hedonism Wines Assistant</h1>
    <p>Ask for recommendations, pairings, or facts about wines in the catalogue.</p>
  </header>

  <div id="log"></div>

  <footer>
    <form id="form">
      <input id="input" autocomplete="off" placeholder="e.g. red Bordeaux under £50" />
      <button id="send" type="submit">Send</button>
    </form>
  </footer>

  <script>
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");

    function add(cls, text) {
      const el = document.createElement("div");
      el.className = "msg " + cls;
      if (text) el.textContent = text;
      log.appendChild(el);
      log.scrollTop = log.scrollHeight;
      return el;
    }

    function renderCitations(bubble, citations) {
      if (!citations || !citations.length) return;
      const box = document.createElement("div");
      box.className = "citations";
      for (const c of citations) {
        const row = document.createElement("div");
        row.className = "citation";
        const a = document.createElement("a");
        a.href = c.url;
        a.target = "_blank";
        a.rel = "noopener";
        a.textContent = c.name;
        row.appendChild(a);
        if (c.price != null) {
          const span = document.createElement("span");
          span.className = "price";
          span.textContent = "  —  " + (c.currency || "GBP") + " " + c.price;
          row.appendChild(span);
        }
        box.appendChild(row);
      }
      bubble.appendChild(box);
    }

    function renderSuggestions(bubble, suggestions) {
      if (!suggestions || !suggestions.length) return;
      const box = document.createElement("div");
      box.className = "suggestions";
      for (const s of suggestions) {
        const chip = document.createElement("button");
        chip.className = "chip";
        chip.type = "button";
        chip.textContent = s;
        chip.onclick = () => { input.value = s; ask(s); };
        box.appendChild(chip);
      }
      bubble.appendChild(box);
    }

    function handleEvent(data, bubble, state) {
      if (typeof data.delta === "string") {
        state.answer += data.delta;
        bubble.firstChild.textContent = state.answer;
      } else {
        // AnswerCompletion: citations + suggestions known only at the end.
        renderCitations(bubble, data.citations);
        renderSuggestions(bubble, data.suggestions);
      }
      log.scrollTop = log.scrollHeight;
    }

    async function ask(message) {
      message = message.trim();
      if (!message) return;
      input.value = "";
      send.disabled = true;
      add("user", message);

      const bubble = add("bot");
      const prose = document.createElement("span");
      bubble.appendChild(prose);
      const state = { answer: "" };

      try {
        const resp = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          prose.className = "error";
          prose.textContent = err.detail || err.error || ("Request failed (" + resp.status + ")");
          return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const frames = buffer.split("\n\n");
          buffer = frames.pop();  // keep the trailing partial frame
          for (const frame of frames) {
            if (frame.startsWith("event: done")) continue;
            const line = frame.split("\n").find((l) => l.startsWith("data: "));
            if (!line) continue;
            const payload = line.slice(6);
            if (payload === "{}") continue;
            handleEvent(JSON.parse(payload), bubble, state);
          }
        }
      } catch (e) {
        prose.className = "error";
        prose.textContent = "Connection error. Please try again.";
      } finally {
        send.disabled = false;
        input.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      ask(input.value);
    });
    input.focus();
  </script>
</body>
</html>
